<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordOrd Mix 瑞典语混合词库</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="kicker">NordOrd Mix · Swedish A1–B2 Core</p>
        <h1>瑞典语混合词库</h1>
        <p class="subtitle">约 1700 个瑞典语词汇与常用短语块。没有等级入口，直接混合背。</p>
      </div>
      <div class="hero-actions">
        <button id="export-btn" class="soft-btn">导出进度</button>
        <button id="reset-btn" class="soft-btn danger-text">重置</button>
      </div>
    </header>

    <section class="dashboard">
      <article>
        <span>词库总量</span>
        <strong id="total-count">0</strong>
      </article>
      <article>
        <span>本轮目标</span>
        <strong id="session-goal-count">50</strong>
      </article>
      <article>
        <span>本轮完成</span>
        <strong id="done-count">0</strong>
      </article>
      <article>
        <span>错题本</span>
        <strong id="wrong-count">0</strong>
      </article>
    </section>

    <section class="controls">
      <label>
        今日/本轮数量
        <select id="goal-select">
          <option value="20">20 个</option>
          <option value="50" selected>50 个</option>
          <option value="100">100 个</option>
          <option value="200">200 个</option>
          <option value="all">全部</option>
        </select>
      </label>

      <label>
        主题
        <select id="theme-select">
          <option value="all">全部主题</option>
        </select>
      </label>

      <label class="search-label">
        搜索
        <input id="search-input" type="search" placeholder="输入瑞典语 / 中文 / 法语" />
      </label>

      <button id="start-btn" class="main-btn">生成学习队列</button>
      <button id="wrong-practice-btn" class="secondary-btn">只练错题</button>
    </section>

    <section class="layout">
      <article class="card">
        <div class="card-meta">
          <span id="theme-badge" class="badge">theme</span>
          <span id="type-badge" class="badge muted">type</span>
        </div>

        <div class="word-zone">
          <h2 id="word">加载中...</h2>
          <button id="speak-btn" class="sound-btn" title="播放发音">🔊</button>
        </div>

        <button id="show-btn" class="reveal-btn">显示答案</button>

        <div id="answer" class="answer hidden">
          <div class="meaning">
            <p><span>中文</span><strong id="zh"></strong></p>
            <p><span>Français</span><strong id="fr"></strong></p>
          </div>

          <div id="note-box" class="note-box hidden"></div>

          <div id="example-box" class="example-box hidden">
            <p id="ex-sv" class="ex-sv"></p>
            <p id="ex-zh"></p>
            <p id="ex-fr"></p>
          </div>
        </div>

        <div class="buttons">
          <button id="unknown-btn" class="unknown">不认识</button>
          <button id="known-btn" class="known">认识</button>
        </div>

        <div class="progress-row">
          <span id="progress-text">0 / 0</span>
          <div class="bar"><div id="bar-fill"></div></div>
        </div>
      </article>

      <aside class="side-panel">
        <section class="mini-panel">
          <h3>错题本</h3>
          <div id="wrong-list" class="list empty">还没有错题。</div>
          <button id="clear-wrong-btn" class="secondary-btn full">清空错题</button>
        </section>

        <section class="mini-panel">
          <h3>词库说明</h3>
          <p>这一版词库混合了单词、短语块和句型。到 B1/B2，比起孤立单词，更重要的是能直接使用的表达单位。</p>
          <p class="warning">注意：大规模词库由结构化生成，适合自用背诵；若用于考试/出版，建议逐批校对。</p>
        </section>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
